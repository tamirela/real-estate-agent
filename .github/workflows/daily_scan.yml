name: DFW Deal Agent — Daily Scan

on:
  schedule:
    # Runs every day at 8:00 AM Central Time (14:00 UTC)
    - cron: '0 14 * * *'
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the deals database from cache (persists between runs)
      - name: Restore deals database
        uses: actions/cache@v4
        with:
          path: deals.db
          key: deals-db-${{ github.run_number }}
          restore-keys: |
            deals-db-

      - name: Run deal agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RENTCAST_API_KEY: ${{ secrets.RENTCAST_API_KEY }}
        run: python main.py

      - name: Upload agent log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-log-${{ github.run_number }}
          path: agent.log
          retention-days: 30

      - name: Save deals database
        uses: actions/cache@v4
        if: always()
        with:
          path: deals.db
          key: deals-db-${{ github.run_number }}
